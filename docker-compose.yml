version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: healing-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: healing
      MONGO_INITDB_ROOT_PASSWORD: healingpassword
      MONGO_INITDB_DATABASE: healing
    volumes:
      - mongodb_data:/data/db
    networks:
      - healing-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healing-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://healing:healingpassword@mongodb:27017/healing?authSource=admin
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - healing-network
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healing-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - healing-network

volumes:
  mongodb_data:
    driver: local

networks:
  healing-network:
    driver: bridge
